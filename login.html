<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion – Pet'ini</title>
  </head>
  <body>
    <nav class="navbar">
      <a class="nav-logo" href="index.html">
        <span class="paw-icon">🐾</span>
        <div>
          <span class="logo-text">PET'INI</span>
          <small>Your pet's new best friend</small>
        </div>
      </a>
      <div class="nav-auth">
        <a href="signup.html" class="btn-outline">S'inscrire</a>
      </div>
    </nav>

    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-paw">🐶</div>
        <h1>Bon retour !</h1>
        <p class="auth-subtitle">Ruff, hooman! Connectez-vous à Pet'ini</p>
        <div id="error-msg" class="error-msg">
          Email ou mot de passe incorrect.
        </div>
        <div id="success-msg" class="success-msg">
          Connexion réussie ! Redirection...
        </div>
        <form id="login-form" action="api/login.php" method="POST">
          <div class="remember-row" style="margin-bottom: 16px">
            <input type="checkbox" id="remember" name="remember" />
            <label for="remember">SE SOUVENIR DE MOI (OPTIONNEL)</label>
          </div>
          <div class="form-group">
            <label for="email">E-MAIL</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="vous@exemple.com"
              required
            />
          </div>
          <div class="form-group">
            <label for="password">MOT DE PASSE</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
            />
          </div>
          <button type="submit" class="btn-auth">🐾 SE CONNECTER !!</button>
        </form>
        <div class="auth-switch">
          Pas encore de compte ?
          <a href="signup.html"
            >Cliquez ici pour en créer un (100% gratuit) !</a
          >
        </div>
      </div>
    </div>
    <script src="js/main.js"></script>
  </body>
</html>
