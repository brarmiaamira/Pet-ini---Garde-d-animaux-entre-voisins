    <header class="search-header">
      <h1>Rechercher un petsitter</h1>
      <p>Trouvez la personne idéale pour prendre soin de votre compagnon 🐾</p>
    </header>

    <section class="search-filters">
      <form class="filters-form" id="search-form">
        <div class="filter-group">
          <label for="ville">Ville</label>
          <input type="text" id="ville" name="ville" placeholder="Ex: Tunis" />
        </div>

        <div class="filter-group">
          <label for="animal">Type d'animal</label>
          <select id="animal" name="animal">
            <option value="">Choisir</option>
            <option value="chien">Chien</option>
            <option value="chat">Chat</option>
            <option value="lapin">Lapin</option>
            <option value="autre">Autre</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="date">Date</label>
          <input type="date" id="date" name="date" />
        </div>

        <div class="filter-group">
          <label for="prix">Budget max</label>
          <input type="number" id="prix" name="prix" placeholder="Ex: 50 DT" />
        </div>

        <button type="submit" class="btn-search">Rechercher</button>
      </form>
    </section>

    <section id="results" class="petsitters-results"></section>
