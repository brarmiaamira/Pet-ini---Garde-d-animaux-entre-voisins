<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inscription – Pet'ini</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&family=Caveat:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar">
      <a class="nav-logo" href="index.html">
        <span class="paw-icon">🐾</span>
        <div>
          <span class="logo-text">PET'INI</span>
          <small>Your pet's new best friend</small>
        </div>
      </a>
      <div class="nav-auth">
        <a href="login.html" class="btn-filled">Se connecter</a>
      </div>
    </nav>

    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-paw">🐾</div>
        <h1>Créer un compte</h1>
        <p class="auth-subtitle">100% gratuit – Rejoignez la communauté !</p>
        <div id="error-msg" class="error-msg"></div>
        <div id="success-msg" class="success-msg"></div>
        <form id="signup-form" action="api/signup.php" method="POST">
          <div class="remember-row" style="margin-bottom: 16px">
            <input type="checkbox" id="remember" name="remember" />
            <label for="remember">SE SOUVENIR DE MOI (OPTIONNEL)</label>
          </div>
          <div class="form-group">
            <label for="prenom">PRÉNOM</label>
            <input
              type="text"
              id="prenom"
              name="prenom"
              placeholder="Votre prénom"
              required
            />
          </div>
          <div class="form-group">
            <label for="nom">NOM</label>
            <input
              type="text"
              id="nom"
              name="nom"
              placeholder="Votre nom"
              required
            />
          </div>
          <div class="form-group">
            <label for="email">E-MAIL</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="vous@exemple.com"
              required
            />
          </div>
          <div class="form-group">
            <label for="email2">CONFIRMER L'E-MAIL</label>
            <input
              type="email"
              id="email2"
              name="email_confirm"
              placeholder="vous@exemple.com"
              required
            />
          </div>
          <div class="form-group">
            <label for="password">MOT DE PASSE</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Min. 8 caractères"
              required
              minlength="8"
            />
          </div>
          <div class="form-group">
            <label for="password2">CONFIRMER LE MOT DE PASSE</label>
            <input
              type="password"
              id="password2"
              name="password_confirm"
              placeholder="Répétez le mot de passe"
              required
            />
          </div>
          <div class="form-group">
            <label for="role">JE SUIS</label>
            <select
              id="role"
              name="role"
              style="
                width: 100%;
                padding: 12px 16px;
                border: 2px solid #e0d4c4;
                border-radius: 12px;
                font-family: 'Nunito', sans-serif;
                font-size: 0.95rem;
                background: var(--cream);
                outline: none;
              "
            >
              <option value="proprietaire">Propriétaire d'animal 🐕</option>
              <option value="gardien">Gardien d'animaux 🏠</option>
              <option value="les_deux">Les deux !</option>
            </select>
          </div>
          <button type="submit" class="btn-auth">🐾 S'INSCRIRE</button>
        </form>
        <div class="auth-switch">
          Vous avez déjà un compte ? <a href="login.html">Se connecter</a>
        </div>
      </div>
    </div>
    <script src="js/main.js"></script>
  </body>
</html>
