<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion – Pet'ini</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&family=Caveat:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="login.css" />
    <link rel="stylesheet" href="style.css"/>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-logo">
        <a href="index.html"><img src="logo.png" alt="Pet'ini logo" class="logo-img" /></a>
      </div>


    <div class="nav-auth">
      <a href="signup.html" class="btn-filled">S'INSCRIRE</a>
    </div>

    
    </nav>
    
    <div class="auth-page">
      
    <div class="paws-left">
        <img src="pawsleft.png" alt="Pattes gauche">
    </div>

    <div class="paws-right">
        <img src="pawsright.png" alt="Pattes droite">
    </div>
    
    <div class="auth-card">
        <h1 class="bon">Bon retour !</h1>
        <form id="login-form" action="../../backend/api/login.php" method="POST">
            <div class="form-group">
              <label for="email">E-MAIL</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="vous@gmail.com"
                required
              />
            </div>
            <div class="form-group">
              <label for="password">MOT DE PASSE</label>
              <div class="password-box">
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="••••••••"
                  required
                />
              <span
                class="toggle-password"
                onclick="togglePassword('password', this)"
              >🙀</span>
              </div>
              <div id="error-msg" class="error-msg" style="display:none">
                Email ou mot de passe incorrect.
              </div>
            </div>
            <a href="fogetpassword" class="forpass">mot de passe oublié ?</a>
            <div class="remember-row" style="margin-bottom: 16px">
              <input type="checkbox" id="remember" name="remember" />
              <label for="remember">SE SOUVENIR DE MOI</label>
            </div>
          </form>
 
          <form action="home.html">
            <button type="submit"  class="btn-auth">s'inscrire</button>
          </form> 
          <div class="auth-switch">
            Pas encore de compte ?
            <a href="signup.html"> Inscris-toi</a>
          </div>
        </div>
      </div>
    <script src="login.js"></script>
  </body>
</html>
