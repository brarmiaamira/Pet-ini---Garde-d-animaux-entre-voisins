<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inscription – Pet'ini</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&family=Caveat:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="signup.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-logo">
        <a href="index.html"><img src="logo.png" alt="Pet'ini logo" class="logo-img" /></a>
      </div>


    <div class="nav-auth">
      <a href="login.html" class="btn-filled">SE CONNECTER</a>
    </div>
    </nav>
    

    <div class="auth-page-signup">
      <div class="paws-left">
          <img src="pawsleft.png" alt="Pattes gauche">
        </div>

        <div class="paws-right">
          <img src="pawsright.png" alt="Pattes droite">
        </div>
      <div class="auth-card-signup">
        <h1 class="bon-signup">Créer un compte</h1>
        
        
        <form id="signup-form" action="../../backend/api/signup.php" method="POST">
          <div class="form-group">
            <label for="prenom">PRÉNOM</label>
            <input
              type="text"
              id="prenom"
              name="prenom"
              placeholder="Votre prénom"
              required
            />
          </div>
          <div class="form-group">
            <label for="nom">NOM</label>
            <input
              type="text"
              id="nom"
              name="nom"
              placeholder="Votre nom"
              required
            />
          </div>
          <div class="form-group">
            <label for="email">E-MAIL</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="vous@gmail.com"
              required
            />
          </div>
          
          <div class="form-group">
            <label for="password">MOT DE PASSE</label>
            <div class="password-box">
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Min. 8 caractères"
                required
                minlength="8"
                required
              />
              <span
                class="toggle-password"
                onclick="togglePassword('password', this)"
              >🙀</span>
            </div>
          </div>
          <div class="form-group">
            <label for="password2">CONFIRMER LE MOT DE PASSE</label>
            <div class="password-box">
              <input
                type="password"
                id="password2"
                name="password_confirm"
                placeholder="Répétez le mot de passe"
                required
              />
              <span
                class="toggle-password"
                onclick="togglePassword('password2', this)"
              >🙀</span>
            </div>
            <div id="error-msg" class="error-msg" style="display: none;"></div>
            
          </div>
          <div class="form-group">
            <label for="role">JE SUIS</label>
            <select
              id="role"
              name="role"
              style="
                width: 100%;
                padding: 12px 16px;
                border: 2px solid #e0d4c4;
                border-radius: 12px;
                font-family: 'Nunito', sans-serif;
                font-size: 0.95rem;
                background: var(--cream);
                outline: none;
              "
            >
              <option value="proprietaire">Propriétaire d'animal 🐕</option>
              <option value="gardien">Gardien d'animaux 🏠</option>
              <option value="les_deux">Les deux !</option>
            </select>
          </div>
          
          <div class="remember-row" style="margin-bottom: 16px">
            <input type="checkbox" id="remember" name="remember" />
            <label for="remember">SE SOUVENIR DE MOI</label>
          </div>
          <form action="home.html">
            <button type="submit">s'inscrire</button>
          </form> 
          
          <div id="success-msg" class="success-msg" style="display: none;"></div>
          
        </form>
        <div class="auth-switch">
          Vous avez déjà un compte ? <a href="login.html">Se connecter</a>
        </div>
      </div>
    </div>
    <script src="signup.js"></script>
  </body>
</html>
